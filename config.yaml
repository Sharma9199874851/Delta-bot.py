# Delta Bot Configuration

# Trading Parameters
trading:
  exchange: "binance"  # or "coinbase"
  pairs:
    - "BTC/USDT"
    - "ETH/USDT"
    - "BNB/USDT"
  timeframe: "4h"  # 1h, 4h, 1d
  initial_capital: 100  # USD
  min_balance: 5  # USD minimum equity

# Risk Management
risk:
  max_position_size: 0.5  # 50% of available balance per trade
  stop_loss_percent: 3  # 3% stop loss
  take_profit_percent: 8  # 8% take profit
  max_concurrent_positions: 3
  max_daily_loss: 10  # Max % loss per day

# Technical Indicators
indicators:
  rsi:
    period: 14
    oversold: 30
    overbought: 70
  macd:
    fast: 12
    slow: 26
    signal: 9
  bollinger_bands:
    period: 20
    std_dev: 2

# Strategy Parameters
strategy:
  momentum_threshold: 0.65  # Signal strength threshold (0-1)
  min_win_rate: 0.78  # Target 78% accuracy
  entry_confirmation: 2  # Require multiple indicator confirmation

# Execution
execution:
  live_trading: false  # Set to true for live trading
  use_market_orders: false  # Use limit orders for better pricing
  order_timeout_minutes: 30

# Logging
logging:
  level: "INFO"
  log_file: "logs/trading.log"
